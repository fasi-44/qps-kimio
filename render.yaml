# Render Blueprint — NQAS Platform (free tier), SINGLE service
# Docs: https://render.com/docs/blueprint-spec
#
# One web service runs BOTH processes (like a full-stack app on one URL):
#   - Next.js  -> binds Render's public $PORT, serves the UI, and proxies
#                 /api, /uploads, /socket.io to the API (next.config.ts).
#   - NestJS   -> binds internal API_PORT (4000); never exposed directly.
# So the browser only ever talks to one origin — no CORS, no separate API URL.
#
# The build step runs `prisma migrate deploy` + the seed, so every deploy
# applies migrations and (idempotently) re-seeds reference data.
#
# You can either apply this as a Blueprint, OR create a single Web Service by
# hand and copy the buildCommand/startCommand/env below (see notes in chat).
#
# ⚠️ Free tier: 512 MB RAM for two Node processes is tight — if it OOMs, add
#   NODE_OPTIONS=--max-old-space-size=400. Service sleeps after ~15 min idle;
#   free Postgres is deleted ~30 days after creation; disk is ephemeral
#   (uploads under apps/api/uploads are lost on redeploy).

databases:
  - name: qps-db
    databaseName: nabh_db
    user: nabh_user
    plan: free

services:
  - type: web
    name: qps-kimio
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile --prod=false &&
      pnpm db:generate &&
      pnpm db:migrate:deploy &&
      pnpm db:seed &&
      pnpm --filter @nabh/api build &&
      pnpm --filter @nabh/web build
    # Root "start" runs the API (internal :4000) and Next.js ($PORT) together.
    startCommand: pnpm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: API_PREFIX
        value: api
      # Internal port the API binds; Next proxies /api to localhost:4000.
      - key: API_PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: qps-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      # Seed accounts: admin@kmio.ac.in / Admin@1234!,
      # assessor1@kmio.ac.in / Demo@1234! (defaults from the seed script).
      - key: SEED_ADMIN_EMAIL
        value: admin@kmio.ac.in
