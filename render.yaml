# Render Blueprint — NQAS Platform (free tier)
# Docs: https://render.com/docs/blueprint-spec
#
# Creates: 1 Postgres DB + 2 web services (NestJS API, Next.js web).
# The API build step runs `prisma migrate deploy` + the seed, so every deploy
# brings the schema up to date and (idempotently) re-seeds reference data.
#
# ⚠️ Free-tier notes:
#   - Web services sleep after ~15 min idle (cold start on next request).
#   - Free Postgres is deleted ~30 days after creation — export/upgrade before then.
#   - Disk is ephemeral: files saved to apps/api/uploads are lost on redeploy.
#     Move uploads to object storage (S3/R2) for anything you need to keep.

databases:
  - name: qps-db
    databaseName: nabh_db
    user: nabh_user
    plan: free

services:
  # ── NestJS API ────────────────────────────────────────────────────────────
  - type: web
    name: qps-kimio-api
    runtime: node
    plan: free
    region: oregon
    branch: main
    # Install dev deps too (nest cli / prisma / tsx are devDependencies),
    # generate the Prisma client, apply migrations, seed, then compile.
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile --prod=false &&
      pnpm db:generate &&
      pnpm db:migrate:deploy &&
      pnpm db:seed &&
      pnpm --filter @nabh/api build
    startCommand: pnpm --filter @nabh/api start:prod
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: API_PREFIX
        value: api
      # Render injects PORT; main.ts binds it (0.0.0.0).
      - key: DATABASE_URL
        fromDatabase:
          name: qps-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      # CORS: must match the web service's public URL.
      - key: FRONTEND_URL
        value: https://qps-kimio.onrender.com
      # Seed accounts — seed script defaults apply if unset
      # (admin@kmio.ac.in / Admin@1234!, assessor1@kmio.ac.in / Demo@1234!).
      - key: SEED_ADMIN_EMAIL
        value: admin@kmio.ac.in
      # Email is optional. Add SMTP_HOST/PORT/USER/PASS/MAIL_FROM in the
      # dashboard later to enable outbound mail — the app runs fine without it.

  # ── Next.js web ───────────────────────────────────────────────────────────
  - type: web
    name: qps-kimio
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile --prod=false &&
      pnpm --filter @nabh/web build
    startCommand: pnpm --filter @nabh/web start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      # Runtime var (NOT baked into the bundle): the Next.js server proxies
      # /api/* and /uploads/* to this URL. Change it + restart — no rebuild.
      - key: API_PROXY_TARGET
        value: https://qps-kimio-api.onrender.com
      # WebSocket connects directly to the API (baked at build time).
      - key: NEXT_PUBLIC_WS_URL
        value: https://qps-kimio-api.onrender.com
